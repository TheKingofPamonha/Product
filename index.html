<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/style.css">
    <title>Product card - Frontend Mentor</title>
</head>
<body>
    <main>
        <section class="container">
            <div class="produto">
                <img src="images/image-product-desktop.jpg" alt="Foto do perfume" class="produto-image">
            </div>

            <div class="produto-info">
            <span class="perfume-titulo">P E R F U M E</span>
            <h1 class="produto-titulo">Gabrielle Essence Eau De Parfum</h1>
            <p class="produto-texto">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
            <div class="produto-preco">
                <span class="preco-atual">$149.99</span>
                <span class="preco-antigo">$169.99</span>
            </div>
            <button class="botao"><img src="images/icon-cart.svg" alt="Ícone do carrinho" class="carrinho">Add to Cart</button>
            </div>
        </section>
    </main>
</body>
</html>
